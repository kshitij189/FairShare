services:
  - type: web
    name: fairshare-backend
    env: docker
    dockerContext: backend
    dockerfilePath: Dockerfile
    plan: free
    region: ohio
    envVars:
      - key: SPRING_DATASOURCE_URL
        sync: false # Set this in Render Dashboard to your Neon URL
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        fromService:
          name: fairshare-frontend
          type: static
          property: url
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash

  - type: static
    name: fairshare-frontend
    env: node
    plan: free
    region: ohio
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishDir: "frontend/build"
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          name: fairshare-backend
          type: web
          property: url
      - key: REACT_APP_GOOGLE_CLIENT_ID
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
